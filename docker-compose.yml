version: "3.9"

services:
  # =========================
  # 1. Backend FastAPI
  # =========================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: storm_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      BACKEND_ENV: "prod"
      # URLs internes (dans le réseau Docker)
      OLLAMA_BASE_URL: "http://ollama:11434"
      N8N_BASE_URL: "http://n8n:5678"
      CHROMA_DB_DIR: "/app/data/chroma"
      LOGS_DIR: "/app/data/logs"
    volumes:
      - ./data/chroma:/app/data/chroma
      - ./data/logs:/app/data/logs
    depends_on:
      - ollama
      - n8n
    networks:
      - stormnet

  # =========================
  # 2. UI Streamlit
  # =========================
  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    container_name: storm_ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      BACKEND_API_BASE_URL: "http://backend:8001"
      N8N_BASE_URL: "http://n8n:5678"
      DEFAULT_LANG: "fr"
    depends_on:
      - backend
      - n8n
    networks:
      - stormnet

  # =========================
  # 3. Ollama (LLM local)
  # =========================
  ollama:
    image: ollama/ollama:latest
    container_name: storm_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_HOST: "0.0.0.0"
    volumes:
      - ./ollama:/root/.ollama
    networks:
      - stormnet

  # =========================
  # 4. n8n (Automation Studio)
  # =========================
  n8n:
    image: n8nio/n8n:latest
    container_name: storm_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: "n8n"
      N8N_PORT: 5678
      WEBHOOK_URL: "http://n8n:5678/"
      GENERIC_TIMEZONE: "Europe/Paris"
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - stormnet

# =========================
# Réseau commun
# =========================
networks:
  stormnet:
    driver: bridge
