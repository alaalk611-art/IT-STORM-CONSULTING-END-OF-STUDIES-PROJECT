meta:
  max_sources_per_refresh: 60
  max_unique_sources_in_latest: 50
  defaults:
    enabled: true
    tier: 2
  notes: |
    Sources orientées "signal" (RSS, release notes, changelog) > homepages.
    Community sources sont désactivées par défaut (login/cookies/boilerplate).
  quotas:
    devops: 10
    data_bigdata: 10
    ai_genai: 10
    security: 10
    cloud_infra: 10

cloud_infra:
  label: "Cloud & Infra"
  enabled: true
  sources:
  - name: AWS – What's New
    url: https://aws.amazon.com/about-aws/whats-new/recent/feed/
    enabled: true
    tier: 1
    weight: 1.0
    type: rss
    lang: en
    tags:
    - aws
  - name: AWS – Security Blog
    url: https://aws.amazon.com/blogs/security/feed/
    enabled: true
    tier: 2
    weight: 0.75
    type: rss
    lang: en
    tags:
